<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Clean — Panel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00C8FF;
    --magenta: #FF2D78;
    --dark: #0D0D1A;
    --darker: #07070F;
    --mid: #1A1A2E;
    --card: #12122A;
    --white: #FFFFFF;
    --gray: #8888AA;
    --yellow: #FFD600;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  /* Boîte d'authentification */
  .admin-box {
    background: var(--card);
    border: 2px dashed var(--magenta);
    padding: 30px;
    max-width: 450px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 20px rgba(255, 45, 120, 0.1);
  }

  .admin-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--white);
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .admin-title span { color: var(--magenta); }

  .field-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: left;
    margin-bottom: 20px;
  }
  .field-label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray);
  }
  .field-input {
    background: var(--dark);
    border: 2px solid rgba(255,255,255,0.1);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 12px 14px;
    outline: none;
    text-align: center;
    letter-spacing: 1px;
  }
  .field-input:focus { border-color: var(--cyan); }

  .btn {
    width: 100%;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 14px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-primary { background: var(--cyan); color: var(--dark); }
  .btn-primary:hover { background: var(--white); }
  .btn-block { background: var(--magenta); color: var(--white); margin-top: 10px; }
  .btn-block:hover { background: #FF005A; }

  #admin-status {
    margin-top: 15px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Zone des contrôles cachée au départ */
  #admin-controls-zone {
    display: none;
    width: 100%;
    max-width: 500px;
    background: var(--card);
    border: 2px solid var(--cyan);
    padding: 30px;
  }
  
  .controls-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--cyan);
    margin-bottom: 20px;
    border-bottom: 2px solid var(--cyan);
    padding-bottom: 5px;
  }

  .row-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 15px;
  }
  select.field-input {
    width: 100%;
    height: 48px;
    cursor: pointer;
    -webkit-appearance: none;
  }
</style>
</head>
<body>

  <div class="admin-box" id="admin-auth-zone">
    <div class="admin-title">🛠️ DRIVE CLEAN — <span>PANEL ADMIN</span></div>
    <div class="field-wrap">
      <label class="field-label">Code Secret Admin</label>
      <input class="field-input" type="password" id="admin-pass-input" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" onclick="verifierMotDePasseAdmin()">Connexion 🔑</button>
    <div id="admin-status"></div>
  </div>

  <div id="admin-controls-zone">
    <div class="controls-title">⚙️ Gestion du Calendrier</div>
    
    <div class="row-grid">
      <div class="field-wrap">
        <label class="field-label">Date Début</label>
        <input class="field-input" type="date" id="admin-date-debut">
      </div>
      <div class="field-wrap">
        <label class="field-label">Date Fin</label>
        <input class="field-input" type="date" id="admin-date-fin">
      </div>
    </div>

    <div class="field-wrap">
      <label class="field-label">Plage Horaire à Bloquer</label>
      <select class="field-input" id="admin-heure-choix">
        <option value="JOURNÉE">Bloquer la Journée Complète (Congé)</option>
        <option value="8:00 AM">8:00 AM</option>
        <option value="9:00 AM">9:00 AM</option>
        <option value="10:00 AM">10:00 AM</option>
        <option value="11:00 AM">11:00 AM</option>
        <option value="12:00 PM">12:00 PM</option>
        <option value="13:00 PM">13:00 PM</option>
        <option value="14:00 PM">14:00 PM</option>
        <option value="15:00 PM">15:00 PM</option>
        <option value="16:00 PM">16:00 PM</option>
        <option value="17:00 PM">17:00 PM</option>
        <option value="18:00 PM">18:00 PM</option>
        <option value="19:00 PM">19:00 PM</option>
      </select>
    </div>

    <button class="btn btn-block" onclick="bloquerPlageAdmin()">Verrouiller ces créneaux 🔒</button>
    <div id="admin-status-controls" style="margin-top: 15px; text-align: center; font-weight: 600;"></div>
  </div>

<script>
  const SUPABASE_URL = 'https://ezhljxnrlinvawdbjioz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6aGxqeG5ybGludmF3ZGJqaW96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDMwMDUsImV4cCI6MjA5NDM3OTAwNX0.tFmlEhpt5rIDxG5F7AmUOhHSjwb3bNlrNUrx9niGBAw';

  // Algorithme de hachage léger et indépendant
  function cyrb256(str) {
    let h1 = 0xdeadbeef, h2 = 0x41c6ce57;
    for (let i = 0, ch; i < str.length; i++) {
      ch = str.charCodeAt(i);
      h1 = Math.imul(h1 ^ ch, 2654435761);
      h2 = Math.imul(h2 ^ ch, 1597334677);
    }
    h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
    h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
    return ((h2 >>> 0).toString(16).padStart(8, '0') + (h1 >>> 0).toString(16).padStart(8, '0'));
  }

  function verifierMotDePasseAdmin() {
    const passSaisi = document.getElementById('admin-pass-input').value.trim();
    const statusEl = document.getElementById('admin-status');
    
    // Vérification de l'empreinte de "Adamch2024.."
    const hashSaisi = cyrb256(passSaisi);
    const hashCorrect = "86dfd5b08c2a41ab"; 
    
    if (hashSaisi === hashCorrect) { 
      // Cache la connexion et montre les outils de blocage
      document.getElementById('admin-auth-zone').style.display = 'none';
      document.getElementById('admin-controls-zone').style.display = 'block';
    } else {
      statusEl.textContent = "Mot de passe incorrect ❌";
      statusEl.style.color = "var(--magenta)";
    }
  }

  // Écouter la touche Entrée pour se connecter plus vite
  document.getElementById('admin-pass-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      verifierMotDePasseAdmin();
    }
  });

  async function bloquerPlageAdmin() {
    const dateDebutStr = document.getElementById('admin-date-debut').value;
    const dateFinStr = document.getElementById('admin-date-fin').value;
    const heureChoisie = document.getElementById('admin-heure-choix').value;
    const statusCtrl = document.getElementById('admin-status-controls');

    if (!dateDebutStr || !dateFinStr) {
      statusCtrl.textContent = "Sélectionnez une date de début et de fin ⚠️";
      statusCtrl.style.color = "var(--magenta)";
      return;
    }

    let dateDebut = new Date(dateDebutStr + 'T00:00:00');
    const dateFin = new Date(dateFinStr + 'T00:00:00');

    if (dateDebut > dateFin) {
      statusCtrl.textContent = "La date de début doit précéder la date de fin !";
      statusCtrl.style.color = "var(--magenta)";
      return;
    }

    statusCtrl.textContent = "Verrouillage en cours...";
    statusCtrl.style.color = "var(--yellow)";

    while (dateDebut <= dateFin) {
      const dateStr = dateDebut.toLocaleDateString('fr-CA');

      try {
        await fetch(`${SUPABASE_URL}/rest/v1/reservations`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          },
          body: JSON.stringify({
            prenom: 'CONGÉ',
            nom: 'Fermeture programmée',
            telephone: '000-000-0000',
            email: 'admin@driveclean.ca',
            adresse: 'N/A',
            vehicule: 'N/A',
            services: 'Créneau bloqué par l\'administrateur',
            date_rdv: dateStr,
            heure_rdv: heureChoisie,
            total: 0
          })
        });
      } catch (e) {
        console.error("Erreur d'insertion pour la date : " + dateStr, e);
      }

      dateDebut.setDate(dateDebut.getDate() + 1);
    }

    statusCtrl.textContent = "Plage(s) bloquée(s) avec succès ! 🎉";
    statusCtrl.style.color = "#00FF66";
  }
</script>
</body>
</html>
